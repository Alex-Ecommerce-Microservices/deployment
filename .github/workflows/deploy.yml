name: Deploy Infrastructure Config

on:
  push:
    branches: [ "main" ] # Tự động chạy khi Hoa push vào branch main của repo deployment

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 1: Tạo thư mục trên server nếu chưa có
      - name: Prepare remote folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/alex-deployment/certs

      # Bước 2: Copy file docker-compose.yml lên server qua SCP
      - name: Copy docker-compose via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "~/alex-deployment/"

      # Bước 3: Ra lệnh cho Docker Compose cập nhật hệ thống
      - name: Execute Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/alex-deployment
            # Pull các image mới nhất từ Docker Hub (Discovery, Gateway, Monolith, Angular)
            docker compose pull
            # Khởi động lại các container với cấu hình mới, dọn dẹp các service cũ bị thừa
            docker compose up -d --remove-orphans