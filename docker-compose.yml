version: '3.8'

services:
  # 1. Database MySQL
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
    volumes:
      - mysql_db_data:/var/lib/mysql
    networks:
      - spring-cloud-net
    deploy:
      resources:
        limits:
          memory: 2G

  # 1b. Redis Cache (Phải ngang hàng với mysql-db)
  redis-cache:
    image: redis:7-alpine
    container_name: redis-cache
    restart: always
    command: redis-server --requirepass ${ALEX_REDIS_PASS}
    networks:
      - spring-cloud-net
    deploy:
      resources:
        limits:
          memory: 512M

  # 2. Discovery Service
  discovery-service:
    image: caohoa/discovery-service:latest
    container_name: discovery-service
    restart: always
    ports:
      - "8761:8761"
    environment:
      JAVA_OPTS: "-Xmx1024m"
    networks:
      - spring-cloud-net
    deploy:
      resources:
        limits:
          memory: 1.5G

  # 3. Monolith Service
  monolith-service:
    image: caohoa/monolith-service:latest
    container_name: monolith-service
    restart: always
    # Port 8081 không cần mở ra ngoài nếu đã có API Gateway
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      JAVA_OPTS: "-Xmx4g"
      ALLOWED_ORIGINS: "https://${SERVER_IP},https://localhost"
    depends_on:
      - mysql-db
      - discovery-service
    networks:
      - spring-cloud-net
    deploy:
      resources:
        limits:
          memory: 6G

  # 4. API Gateway
  api-gateway:
    image: caohoa/api-gateway:latest
    container_name: api-gateway
    ports:
      - "8443:8443"
    volumes:
      - ./certs/alexvo-keystore.p12:/app/certs/keystore.p12
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-service:8761/eureka/
      SERVER_SSL_KEY_STORE: "file:/app/certs/keystore.p12"
      SERVER_SSL_KEY_STORE_PASSWORD: ${SERVER_SSL_KEY_STORE_PASSWORD}
      JAVA_OPTS: "-Xmx1536m"
    depends_on:
      - discovery-service
    networks:
      - spring-cloud-net
    deploy:
      resources:
        limits:
          memory: 2G

  # 5. Angular Frontend
  angular-frontend:
    image: caohoa/angular-frontend:latest
    container_name: angular-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api-gateway
    networks:
      - spring-cloud-net
    deploy:
      resources:
        limits:
          memory: 1G

  # 6. Watchtower (Tự động cập nhật image)
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Nếu dùng Docker Hub Private, cần mount file config auth
      - ~/.docker/config.json:/config.json
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: 30 # 1 tiếng check 1 lần là đủ, 30s là quá dày
    networks:
      - spring-cloud-net

networks:
  spring-cloud-net:
    driver: bridge

volumes:
  mysql_db_data: